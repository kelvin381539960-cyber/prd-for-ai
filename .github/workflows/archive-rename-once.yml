name: Rename archive converted PRD once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  rename-archive:
    if: "!contains(github.event.head_commit.message, '[archive-rename-done]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename converted PRD archive to legacy PRD
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p archive/legacy-prd

          if [ -d archive/converted-prd ]; then
            shopt -s dotglob nullglob
            for item in archive/converted-prd/*; do
              base="$(basename "$item")"
              if [ -e "archive/legacy-prd/$base" ]; then
                if [ -d "$item" ] && [ -d "archive/legacy-prd/$base" ]; then
                  rsync -a "$item/" "archive/legacy-prd/$base/"
                  rm -rf "$item"
                else
                  rm -rf "archive/legacy-prd/$base"
                  mv "$item" "archive/legacy-prd/$base"
                fi
              else
                mv "$item" "archive/legacy-prd/$base"
              fi
            done
            rmdir archive/converted-prd 2>/dev/null || rm -rf archive/converted-prd
          fi

          # Update references in tracked text files.
          python - <<'PY'
          from pathlib import Path
          for p in Path('.').rglob('*'):
              if not p.is_file() or '.git' in p.parts:
                  continue
              if p.suffix.lower() not in {'.md', '.yml', '.yaml', '.json', '.txt'}:
                  continue
              data = p.read_text(encoding='utf-8', errors='ignore')
              new = data.replace('archive/converted-prd', 'archive/legacy-prd').replace('`converted-prd/`', '`legacy-prd/`').replace('converted-prd/conversion-reports', 'legacy-prd/conversion-reports')
              if new != data:
                  p.write_text(new, encoding='utf-8')
          PY

          # Ensure archive index uses the intended directory name.
          if [ -f archive/README.md ]; then
            sed -i 's/`converted-prd\/`/`legacy-prd\/`/g' archive/README.md
            sed -i 's/converted-prd\/conversion-reports/legacy-prd\/conversion-reports/g' archive/README.md
            sed -i 's/Legacy PRD Markdown archive converted from historical Word documents/Legacy PRD Markdown archive converted from historical Word documents/g' archive/README.md
          fi

          # Remove this one-time workflow after successful migration.
          rm -f .github/workflows/archive-rename-once.yml

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rename converted PRD archive to legacy PRD [archive-rename-done]"
            git push
          fi
