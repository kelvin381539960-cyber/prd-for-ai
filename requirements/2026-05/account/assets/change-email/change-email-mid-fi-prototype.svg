<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f8f9fc}.title{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.sub{font:500 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#4b5563}.label{font:700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.phone{fill:#fff;stroke:#d9dde7;stroke-width:1.2;filter:url(#shadow)}.card{fill:#f4f4f5}.line{stroke:#e5e7eb;stroke-width:1}.text{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.muted{font:500 12px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7280}.tiny{font:500 10px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7280}.purple{fill:#6f46e8}.purpleText{fill:#6f46e8}.orange{fill:#f97316}.green{fill:#15a86b}.btn{fill:#6f46e8}.input{fill:#fff;stroke:#d9dde7;stroke-width:1.2}.hi{fill:#fff;stroke:#6f46e8;stroke-width:1.6}.arrow{stroke:#6f46e8;stroke-width:3;fill:none;marker-end:url(#arrowhead)}.step{fill:#6f46e8}.white{fill:#fff}.success{fill:#5cc37a}.ok{fill:#16a34a}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#111827" flood-opacity="0.10"/></filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6f46e8"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="800" y="45" text-anchor="middle">AIX｜更换邮箱中保真原型</text>
  <text class="sub" x="800" y="78" text-anchor="middle">V1：个人中心入口 → 更换说明 → 旧邮箱 OTP → 新邮箱输入 → 新邮箱 OTP → 更换成功</text>

  <!-- labels -->
  <g transform="translate(210,118)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">1</text><text class="label" x="28" y="6">个人中心 Email 入口</text></g>
  <g transform="translate(708,118)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">2</text><text class="label" x="28" y="6">更换邮箱说明</text></g>
  <g transform="translate(1208,118)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">3</text><text class="label" x="28" y="6">验证旧邮箱</text></g>
  <g transform="translate(210,568)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">4</text><text class="label" x="28" y="6">输入新邮箱</text></g>
  <g transform="translate(708,568)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">5</text><text class="label" x="28" y="6">验证新邮箱</text></g>
  <g transform="translate(1208,568)"><circle class="step" r="15"/><text class="white" text-anchor="middle" y="5" font-size="15" font-weight="700">6</text><text class="label" x="28" y="6">更换成功</text></g>

  <!-- arrows -->
  <path class="arrow" d="M510 320 H575"/><path class="arrow" d="M1010 320 H1075"/>
  <path class="arrow" d="M510 735 H575"/><path class="arrow" d="M1010 735 H1075"/>
  <path class="arrow" d="M1375 460 C1375 535 565 535 565 640"/>

  <!-- phone 1 -->
  <g transform="translate(130,140)">
    <rect class="phone" x="0" y="0" width="380" height="405" rx="24"/>
    <text class="text" x="28" y="30">22:54</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi  70</text><text class="text" x="340" y="66">×</text>
    <circle cx="190" cy="63" r="31" fill="#eeeeef"/><circle cx="190" cy="53" r="11" fill="#d9d9db"/><path d="M165 86 Q190 62 215 86" fill="#d9d9db"/>
    <text class="title" style="font-size:22px" x="190" y="121" text-anchor="middle">AIX_ZLNSPF</text><text class="orange" style="font:500 13px sans-serif" x="190" y="142" text-anchor="middle">@ Kelvinfeng</text>
    <rect class="card" x="26" y="162" width="155" height="62" rx="12"/><text class="text" x="50" y="199">Verification status</text><rect class="green" x="120" y="177" width="62" height="22" rx="5"/><text class="white" x="151" y="193" text-anchor="middle" font-size="11">Verified</text>
    <rect class="card" x="199" y="162" width="155" height="62" rx="12"/><text class="text" x="236" y="199">Notifications</text><circle class="orange" cx="332" cy="177" r="10"/><text class="white" x="332" y="181" text-anchor="middle" font-size="11">1</text>
    <text class="text" x="26" y="250" font-weight="700">Account</text>
    <rect class="card" x="26" y="260" width="328" height="72" rx="12"/><text class="text" x="64" y="288">Display name</text><text class="muted" x="275" y="288">AIX_ZLNSPF</text><text class="text" x="340" y="288">✎</text><line class="line" x1="44" y1="300" x2="340" y2="300"/><text class="text" x="64" y="318">X-Tag</text><text class="muted" x="288" y="318">@Kelvinfeng</text><text class="text" x="340" y="318">▢</text>
    <text class="text" x="26" y="356" font-weight="700">Security</text>
    <rect class="card" x="26" y="366" width="328" height="112" rx="12"/><text class="text" x="64" y="394">Change password</text><text class="text" x="340" y="394">›</text><line class="line" x1="44" y1="406" x2="340" y2="406"/><text class="text" x="64" y="424">Phone number</text><text class="orange" style="font:600 13px sans-serif" x="304" y="424">Add</text><text class="text" x="340" y="424">›</text><line class="line" x1="44" y1="436" x2="340" y2="436"/>
    <rect class="hi" x="26" y="443" width="328" height="34" rx="8"/><text class="text" x="64" y="465">Email</text><text class="muted" x="235" y="465">2********8@qq.com</text><text class="text" x="340" y="465">›</text>
  </g>

  <!-- phone 2 -->
  <g transform="translate(620,140)">
    <rect class="phone" width="380" height="405" rx="24"/><text class="text" x="28" y="30">9:41</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi</text><text class="text" x="28" y="70">‹</text><text class="label" x="190" y="70" text-anchor="middle">更换邮箱</text>
    <rect fill="#eef0ff" x="28" y="92" width="324" height="58" rx="9"/><circle class="purple" cx="50" cy="121" r="10"/><text class="white" x="50" y="125" text-anchor="middle" font-size="13">i</text><text class="text" x="70" y="116">更换邮箱后，将影响账号登录、找回密码</text><text class="text" x="70" y="136">以及 Email OTP 验证，请确保新邮箱可用。</text>
    <rect class="input" x="28" y="168" width="324" height="38" rx="8"/><text class="text" x="48" y="193">当前邮箱</text><text class="text" x="205" y="193">2********8@qq.com</text>
    <text class="text" x="28" y="235">更换流程共分为以下 3 步：</text>
    <circle class="purple" cx="50" cy="264" r="11"/><text class="white" x="50" y="268" text-anchor="middle" font-size="12">1</text><text class="text" x="76" y="268">验证旧邮箱</text>
    <circle class="purple" cx="50" cy="300" r="11"/><text class="white" x="50" y="304" text-anchor="middle" font-size="12">2</text><text class="text" x="76" y="304">输入新邮箱</text>
    <circle class="purple" cx="50" cy="336" r="11"/><text class="white" x="50" y="340" text-anchor="middle" font-size="12">3</text><text class="text" x="76" y="340">验证新邮箱</text>
    <rect class="btn" x="28" y="354" width="324" height="42" rx="9"/><text class="white" x="190" y="381" text-anchor="middle" font-size="17" font-weight="700">开始更换</text>
  </g>

  <!-- phone 3 -->
  <g transform="translate(1110,140)">
    <rect class="phone" width="380" height="405" rx="24"/><text class="text" x="28" y="30">9:41</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi</text><text class="text" x="28" y="70">‹</text><text class="label" x="190" y="70" text-anchor="middle">验证旧邮箱</text>
    <text class="text" x="190" y="140" text-anchor="middle">验证码已发送至 2********8@qq.com</text>
    <rect class="hi" x="58" y="180" width="58" height="58" rx="8"/><rect class="input" x="136" y="180" width="58" height="58" rx="8"/><rect class="input" x="214" y="180" width="58" height="58" rx="8"/><rect class="input" x="292" y="180" width="58" height="58" rx="8"/>
    <text class="muted" x="190" y="276" text-anchor="middle">55s 后可重新发送</text>
    <rect class="btn" x="28" y="344" width="324" height="42" rx="9"/><text class="white" x="190" y="371" text-anchor="middle" font-size="17" font-weight="700">继续</text>
  </g>

  <!-- phone 4 -->
  <g transform="translate(130,590)">
    <rect class="phone" width="380" height="270" rx="22"/><text class="text" x="28" y="30">9:41</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi</text><text class="text" x="28" y="65">‹</text><text class="label" x="190" y="65" text-anchor="middle">输入新邮箱</text>
    <text class="text" x="28" y="96">请输入新的邮箱地址</text><rect class="input" x="28" y="110" width="324" height="34" rx="8"/><text class="muted" x="48" y="132">请输入新的邮箱地址</text>
    <circle class="ok" cx="42" cy="174" r="10"/><text class="white" x="42" y="178" text-anchor="middle" font-size="12">✓</text><text class="text" x="62" y="178">格式正确（如：xxx@xxx.com）</text>
    <circle class="ok" cx="42" cy="202" r="10"/><text class="white" x="42" y="206" text-anchor="middle" font-size="12">✓</text><text class="text" x="62" y="206">与当前邮箱不同</text>
    <circle class="ok" cx="42" cy="230" r="10"/><text class="white" x="42" y="234" text-anchor="middle" font-size="12">✓</text><text class="text" x="62" y="234">未被其他账户使用</text>
    <rect class="btn" x="28" y="224" width="324" height="38" rx="8" opacity="0.98"/><text class="white" x="190" y="249" text-anchor="middle" font-size="16" font-weight="700">发送验证码</text>
  </g>

  <!-- phone 5 -->
  <g transform="translate(620,590)">
    <rect class="phone" width="380" height="270" rx="22"/><text class="text" x="28" y="30">9:41</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi</text><text class="text" x="28" y="65">‹</text><text class="label" x="190" y="65" text-anchor="middle">验证新邮箱</text>
    <text class="text" x="190" y="108" text-anchor="middle">验证码已发送至 new***@gmail.com</text>
    <rect class="hi" x="58" y="140" width="58" height="50" rx="8"/><rect class="input" x="136" y="140" width="58" height="50" rx="8"/><rect class="input" x="214" y="140" width="58" height="50" rx="8"/><rect class="input" x="292" y="140" width="58" height="50" rx="8"/>
    <text class="muted" x="190" y="220" text-anchor="middle">55s 后可重新发送</text>
    <rect class="btn" x="28" y="222" width="324" height="38" rx="8"/><text class="white" x="190" y="247" text-anchor="middle" font-size="16" font-weight="700">确认更换</text>
  </g>

  <!-- phone 6 -->
  <g transform="translate(1110,590)">
    <rect class="phone" width="380" height="270" rx="22"/><text class="text" x="28" y="30">9:41</text><text class="tiny" x="310" y="30">▮▮  Wi‑Fi</text>
    <circle class="success" cx="190" cy="70" r="32"/><text class="white" x="190" y="81" text-anchor="middle" font-size="40" font-weight="800">✓</text>
    <text class="label" x="190" y="124" text-anchor="middle">邮箱更换成功</text>
    <rect class="card" x="78" y="145" width="224" height="36" rx="8"/><text class="text" x="108" y="168">新邮箱</text><text class="purpleText" x="174" y="168" font-weight="700">new***@gmail.com</text>
    <text class="muted" x="190" y="206" text-anchor="middle">后续登录、找回密码以及 Email OTP</text><text class="muted" x="190" y="224" text-anchor="middle">将使用新邮箱。</text>
    <rect class="btn" x="28" y="224" width="324" height="38" rx="8"/><text class="white" x="190" y="249" text-anchor="middle" font-size="16" font-weight="700">返回个人中心</text>
  </g>
</svg>
